<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#000000"/>
<title>Login — Fabio Antunes Prime Coaching</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/site.css"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <a href="index.html" class="brand"><span class="brand-logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="goldFace" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#FBE090"/>
      <stop offset="35%" stop-color="#F5C75A"/>
      <stop offset="70%" stop-color="#DAAC2F"/>
      <stop offset="100%" stop-color="#A57E1A"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5C75A"/>
      <stop offset="100%" stop-color="#8C7028"/>
    </linearGradient>
    <linearGradient id="goldShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A57E1A"/>
      <stop offset="100%" stop-color="#5A4310"/>
    </linearGradient>
  </defs>

  <!-- F: stylized angular -->
  <!-- Vertical stroke with diagonal cut -->
  <polygon points="38,30 78,30 92,42 92,170 60,170 60,118 80,118 80,98 60,98 60,52 38,52" fill="url(#goldFace)"/>
  <polygon points="60,170 60,118 80,118 80,128 70,128 70,170" fill="url(#goldShadow)" opacity="0.55"/>

  <!-- A: stylized angular with sharp slant -->
  <polygon points="118,170 138,30 162,30 184,170 162,170 158,138 122,138 118,170" fill="url(#goldFace)"/>
  <!-- A inner cut -->
  <polygon points="128,118 152,118 145,72 138,72" fill="#0A0A0A"/>
  <!-- A right shadow -->
  <polygon points="184,170 162,170 158,138 178,138" fill="url(#goldShadow)" opacity="0.55"/>

  <!-- Connecting blade between F and A -->
  <polygon points="80,98 138,72 152,72 92,108" fill="url(#goldEdge)" opacity="0.75"/>
  <polygon points="92,108 152,72 152,82 92,118" fill="#0A0A0A" opacity="0.35"/>

  <!-- Highlight strokes -->
  <polygon points="38,30 60,30 60,52 38,52" fill="#FBE090" opacity="0.35"/>
  <polygon points="138,30 144,30 138,72 132,72" fill="#FBE090" opacity="0.3"/>
</svg></span><span class="brand-name">FABIO ANTUNES<small>PRIME COACHING</small></span></a>
    <h1>Willkommen zurück</h1>
    <p class="sub">Mitglieder- & Coachbereich</p>

    <div id="loginAlert"></div>

    <form id="loginForm">
      <div class="field">
        <label>Login oder E-Mail</label>
        <input type="text" id="login" placeholder="z.B. Fabio oder deine@email.de" autocomplete="username"/>
      </div>
      <div class="field">
        <label>Passwort</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-2);margin-bottom:18px;cursor:pointer;">
        <input type="checkbox" id="remember" style="width:auto;"/> Angemeldet bleiben
      </label>
      <button type="submit" class="btn btn-gold btn-block">Einloggen</button>
    </form>

    <div class="demo-hint">
      <b>Demo-Zugänge</b><br/>
      Coach (Admin): <code>Fabio</code> / <code>Fabio123!</code><br/>
      Kunde: <code>stefan-wittenberg@gmx.de</code> / <code>Fabio123!</code><br/>
      <a href="index.html" style="color:var(--gold);display:inline-block;margin-top:8px;">← Zur Website</a>
    </div>
  </div>
</div>

<script src="assets/auth.js"></script>
<script>
(function () {
  // Bereits eingeloggt? Direkt weiterleiten.
  var u = FA.currentUser();
  if (u) { location.href = (u.role === 'admin') ? 'admin.html' : 'app.html'; }

  var form = document.getElementById('loginForm');
  var alertBox = document.getElementById('loginAlert');
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var res = FA.login(
      document.getElementById('login').value,
      document.getElementById('password').value,
      document.getElementById('remember').checked
    );
    if (!res.ok) {
      alertBox.innerHTML = '<div class="alert alert-error">' + res.error + '</div>';
      return;
    }
    location.href = (res.user.role === 'admin') ? 'admin.html' : 'app.html';
  });
})();
</script>
</body>
</html>
