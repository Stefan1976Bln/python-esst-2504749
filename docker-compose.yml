services:
  web:
    build: .
    env_file: .env
    volumes:
      - ./data:/data
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./data/uploads:/data/uploads:ro
      - ./app/static:/app/static:ro
    depends_on:
      - web
    restart: unless-stopped
